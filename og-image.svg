  <text x="500" y="438" text-anchor="middle" font-size="26" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="white">좋아 💖</text>
  <text x="700" y="438" text-anchor="middle" font-size="26" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="#3F1D2E">잠깐만 🙈</text>
