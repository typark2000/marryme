<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFE4E6"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="180" x2="940" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4D8D"/>
      <stop offset="1" stop-color="#FF7AA8"/>
    </linearGradient>
    <filter id="shadow" x="180" y="100" width="840" height="430" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#FF4D8D" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="220" y="120" width="760" height="390" rx="36" fill="white" fill-opacity="0.86"/>
