  <circle cx="600" cy="205" r="48" fill="url(#accent)"/>
  <text x="600" y="220" text-anchor="middle" font-size="42" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="white">💍</text>
  <text x="600" y="300" text-anchor="middle" font-size="64" font-weight="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="#3F1D2E">Marry Me</text>
  <text x="600" y="356" text-anchor="middle" font-size="30" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="#7A5566">100 days of playful proposal pages</text>
  <rect x="407" y="401" width="186" height="58" rx="29" fill="url(#accent)"/>
