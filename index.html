<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marry Me — Daily Proposal Designs</title>
    <meta
      name="description"
      content="매일 하나씩 업로드되는 장난기 가득한 청혼 웹페이지 디자인 갤러리"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card" id="todayCard">
        <div id="todayContent"></div>
      </section>

      <section class="archive card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">ARCHIVE</p>
            <h3>지난 청혼 디자인</h3>
          </div>
          <p class="section-copy">매일 하나씩 쌓이는 청혼 실험들을 둘러볼 수 있어.</p>
        </div>
        <div class="archive-grid" id="archiveGrid"></div>
      </section>

      <section class="about card">
        <h3>Marry Me란?</h3>
        <p>
          <strong>Marry Me</strong>는 매일 하나씩 새로운 청혼 페이지 디자인을 올리는
          웹앱이다. 귀엽고, 웃기고, 때로는 약간 얄미운 인터랙션으로 사용자가 직접
          체험해볼 수 있다.
        </p>
        <ul>
          <li>매일 다른 테마와 인터랙션</li>
          <li>거절 버튼을 누르기 어렵게 만드는 장난기</li>
          <li>이제 날짜별 아카이브로 이전 디자인도 다시 볼 수 있음</li>
        </ul>
      </section>
    </main>

    <noscript>
      <div class="noscript-banner">
        JavaScript가 꺼져 있어 인터랙션은 제한되지만, 페이지 내용은 계속 볼 수 있어.
      </div>
    </noscript>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
