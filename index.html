<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marry Me — Daily Proposal Designs</title>
    <meta name="description" content="매일 하나씩 업로드되는 장난기 가득한 청혼 웹페이지 디자인 갤러리" />
    <meta property="og:title" content="Marry Me — Daily Proposal Designs" />
    <meta property="og:description" content="매일 하나씩 업로드되는 장난기 가득한 청혼 웹페이지 디자인 갤러리" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://typark2000.github.io/marryme/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card" id="todayCard">
        <div id="todayContent"></div>
      </section>

      <section class="archive card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">ARCHIVE</p>
            <h3>지난 청혼 디자인</h3>
          </div>
          <p class="section-copy">매일 하나씩 쌓이는 청혼 실험들을 둘러보고, 각 day 상세 페이지로 들어갈 수 있어.</p>
        </div>
        <div class="archive-toolbar">
          <input id="archiveSearch" class="archive-search" type="search" placeholder="day, slug, interaction, tag 검색" aria-label="archive search" />
          <div class="archive-toolbar-meta">
            <span id="archiveCount" class="archive-count">0 / 0</span>
            <a id="archiveLatestLink" class="text-link" href="day/?slug=day-100">최신 day 보기 →</a>
          </div>
        </div>
        <p id="archiveEmpty" class="empty-copy" hidden>검색 결과가 없어.</p>
        <div class="archive-grid" id="archiveGrid"></div>
      </section>

      <section class="about card">
        <h3>마음에 드는 프러포즈를 골라보세요</h3>
        <p>아마 상대도 거절할 수 없을거에요</p>
      </section>
    </main>

    <noscript>
      <div class="noscript-banner">
        JavaScript가 꺼져 있어 인터랙션은 제한되지만, 페이지 내용은 계속 볼 수 있어.
      </div>
    </noscript>

    <script src="interaction-types.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="script.js"></script>
  </body>
</html>
